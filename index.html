<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Golf — Игра</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hud">
        <div class="hud__group">
          <span>Категория: <strong id="category">—</strong></span>
          <span>Лунка: <strong id="level">1</strong></span>
          <span>Пар: <strong id="par">3</strong></span>
          <span>Удары: <strong id="strokes">0</strong></span>
          <span>Очки: <strong id="score">0</strong></span>
          <span id="multiMeta" hidden>Комната: <strong id="roomCode">—</strong> · Ты: <strong id="youName">—</strong> · Соперник: <strong id="opponentName">—</strong> · Ход: <strong id="turnName">—</strong></span>
        </div>
        <div class="hud__group">
          <a class="link-btn" href="./menu.html">Категории</a>
          <button id="restart">Заново</button>
          <button id="next" disabled>Следующая</button>
        </div>
      </header>

      <section class="board-wrap">
        <canvas id="board" width="1180" height="640"></canvas>
        <p id="message" class="message">Загружаем категорию…</p>
      </section>
    </main>

    <div id="quizModal" class="modal" hidden>
      <div class="modal__card">
        <h2>Реши задачу для удара</h2>
        <p id="questionLabel" class="question">Вопрос...</p>
        <div class="quiz-row">
          <input id="answerInput" type="text" inputmode="text" placeholder="Ответ" />
          <button id="submitAnswer">Ответить</button>
        </div>
        <div class="quiz-row">
          <button id="newQuestion">Другой вопрос</button>
        </div>
      </div>
    </div>

    <script type="module" src="./game.js"></script>
  </body>
</html>
